# TLS hardening — included by blog.conf
# Safe for all modern clients (TLS 1.2+).

ssl_protocols             TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;
ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;
ssl_session_tickets       off;

# OCSP stapling — only effective with a CA-signed cert (Let's Encrypt or paid).
# Safe to leave on with self-signed; nginx will silently skip it.
ssl_stapling              on;
ssl_stapling_verify       on;
resolver                  1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout          5s;

# Security headers
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options           DENY                                            always;
add_header X-Content-Type-Options    nosniff                                         always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;
