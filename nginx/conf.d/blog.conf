# nginx/conf.d/blog.conf
#
# HOW TO SWITCH CERTIFICATES
# ─────────────────────────────────────────────────────────────────────────────
# 1. Self-signed (default, works out of the box):
#    ssl_certificate     /etc/nginx/certs/self-signed/cert.pem;
#    ssl_certificate_key /etc/nginx/certs/self-signed/key.pem;
#
# 2. Let's Encrypt (free, automated via certbot):
#    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
#    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
#
# 3. Paid / custom CA:
#    ssl_certificate     /etc/nginx/certs/custom/fullchain.pem;
#    ssl_certificate_key /etc/nginx/certs/custom/privkey.pem;
#
# Set DOMAIN to your actual domain name (e.g. blog.example.com).
# Replace "localhost" in server_name with your domain when going live.
# ─────────────────────────────────────────────────────────────────────────────

# Upstream — must be at http context level, not inside server {}
upstream api {
    server web:8000;
    keepalive 32;
}

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name localhost;               # ← replace with your domain

    # Let's Encrypt ACME challenge passthrough (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;               # ← replace with your domain

    # Certificate (choose one set from the header above)
    ssl_certificate     /etc/nginx/certs/self-signed/cert.pem;
    ssl_certificate_key /etc/nginx/certs/self-signed/key.pem;

    # TLS hardening
    include /etc/nginx/snippets/ssl-params.conf;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Static & media files (served directly by nginx)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # API — proxy to gunicorn
    location / {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — align with gunicorn --timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }
}
